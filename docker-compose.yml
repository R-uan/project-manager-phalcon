services:
  app:
    build: .
    volumes:
      - .:/var/www
    expose:
      - "9000"
  nginx:
    image: nginx:stable-alpine
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  browsersync:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "3000:3000"
      - "3001:3001" # browser-sync UI
    command: >
      sh -c "npm install -g browser-sync &&
             browser-sync start --proxy 'nginx:80' --files 'app/views/**/*.volt' --port 3000 --host 0.0.0.0"

  development_database:
    container_name: devdb
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - development_database_vol:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  development_database_vol:
